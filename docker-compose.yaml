services:
  filebeat:
    image: docker.elastic.co/beats/filebeat:9.2.0
    networks:
      - event-generator
    container_name: filebeat-event-generator
    volumes:
      - ./infra/docker-compose/entrypoint.override.sh:/usr/local/bin/docker-entrypoint:ro
      - ./infra/docker-compose/filebeat.docker.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./infra/parser-tests/logs:/var/log/shared:rw
      - logs-shared:/var/log/shared:ro

  event-generator:
    build:
      context: ./
      dockerfile: Dockerfile.dev
    volumes:
      - ./:/app
      - cargo-target:/app/target
      - cargo-registry:/usr/local/cargo/registry
      - ./infra/docker-compose/conf.toml:/config/config.toml:ro
      - logs-shared:/var/log/shared
    container_name: event-generator
    labels:
      - "traefik.enable=true"
      # API routes
      - "traefik.http.routers.event_generator_api.priority=10"
      - "traefik.http.routers.event_generator_api.rule=PathPrefix(`/api/`) || PathPrefix(`/ws`)"
      - "traefik.http.routers.event_generator_api.entrypoints=web"
      - "traefik.http.services.event_generator_api.loadbalancer.server.port=8080"
    networks:
      - event-generator

  spa_react:
    mem_limit: 512m
    mem_reservation: 512M
    cpus: 2
    container_name: "event-generator-frontend"
    build:
      context: dashboard/
      dockerfile: Dockerfile
    networks:
      - event-generator
    volumes:
      - ./dashboard/:/app
      - /app/node_modules/
    labels:
      - "traefik.enable=true"
      # Catch-all: everything not /api/ or /ws goes to React
      - "traefik.http.routers.spa_react.priority=1"
      - "traefik.http.routers.spa_react.rule=PathPrefix(`/`)"
      - "traefik.http.routers.spa_react.entrypoints=web"
      - "traefik.http.services.spa_react.loadbalancer.server.port=3000"

  reverse-proxy:
    image: traefik:v3
    command:
      - --api.insecure=true
      - --providers.docker
      - --entrypoints.web.address=:5000
      - --accesslog=true
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - event-generator

networks:
  event-generator:
    name: event-generator

volumes:
  logs-shared:
    name: logs-shared
  cargo-target:
    name: event-generator-cargo-target
  cargo-registry:
    name: event-generator-cargo-registry
