# Example: Rhai scripting engine for complex log generation
# Each script execution produces a complete trace (potentially multi-line)

[[streams]]
name = "java-app"
enabled = true

[streams.format]
type = "script"
script_file = "scripts/java_trace.rhai"
# max_operations = 10000  # optional, default 10000

[streams.output]
type = "stdout"

[streams.rate]
eps = 2.0
