name: Docker Debug Build

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build-debug-image:
    name: Build linux/amd64 debug image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build debug image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          tags: event-generator-debug:latest
          load: true
          push: false

      - name: Smoke test image
        run: docker run --rm event-generator-debug:latest --help
